appId: com.doinikhishab.app
---
# Flow 2: View budget - navigate to budget tab, check categories visible
- launchApp:
    clearState: true
- runFlow: shared/complete-onboarding.yaml

# Navigate to Budget tab (tab labels use i18n text "Budget")
- tapOn: "Budget"

# Verify budget screen is displayed
- assertVisible:
    id: "budget-screen"

# Verify Ready to Assign hero is visible
- assertVisible:
    id: "ready-to-assign"

# Verify month navigator is visible
- assertVisible:
    id: "month-navigator"
