appId: com.doinikhishab.app
---
# Flow 3: Navigate reports - tab between chart views
- launchApp:
    clearState: true
- runFlow: shared/complete-onboarding.yaml

# Navigate to Reports tab
- tapOn: "Reports"

# Verify reports screen is displayed
- assertVisible:
    id: "reports-screen"

# Verify spending tab is visible (default active)
- assertVisible:
    id: "report-tab-spending"

# Switch to Income/Expense tab
- tapOn:
    id: "report-tab-income_expense"

# Switch to Net Worth tab
- tapOn:
    id: "report-tab-net_worth"

# Switch to Financial Health tab
- tapOn:
    id: "report-tab-financial_health"

# Switch to Cash Flow (Sankey) tab
- tapOn:
    id: "report-tab-sankey"

# Verify we're still on reports screen
- assertVisible:
    id: "reports-screen"
