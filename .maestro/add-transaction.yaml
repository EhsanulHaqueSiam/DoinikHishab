appId: com.doinikhishab.app
---
# Flow 1: Add transaction via QuickAdd 3-tap
# Tests the core differentiator: amount -> category -> auto-save
- launchApp:
    clearState: true
- runFlow: shared/complete-onboarding.yaml

# Verify FAB is visible on dashboard
- assertVisible:
    id: "quick-add-fab"

# Tap FAB to open QuickAdd bottom sheet
- tapOn:
    id: "quick-add-fab"

# Verify amount pad is displayed
- assertVisible:
    id: "amount-pad"

# Enter amount: 500 (taka)
- tapOn:
    id: "keypad-5"
- tapOn:
    id: "keypad-0"
- tapOn:
    id: "keypad-0"

# Verify amount display is visible
- assertVisible:
    id: "amount-display"

# Tap "Next" to go to category step
- tapOn:
    id: "amount-next"

# Verify category step is visible
- assertVisible:
    id: "category-step"

# Tap first category (auto-saves per 3-tap flow)
- tapOn:
    id: "category-item-0"

# After save, should return to dashboard (batch mode reset after 350ms)
- extendedWaitUntil:
    visible:
      id: "quick-add-fab"
    timeout: 5000
