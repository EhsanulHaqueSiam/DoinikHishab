# Gradle properties — applied on expo prebuild
# Tuned for i7-13700H (14 cores / 20 threads) + 16GB RAM

# Parallel project execution across all modules
org.gradle.parallel=true

# Use 8 workers — fills E-cores while P-cores handle main build thread
org.gradle.workers.max=8

# Gradle daemon stays warm between builds
org.gradle.daemon=true

# JVM heap for Gradle daemon — 3GB leaves room for Metro + browser
org.gradle.jvmargs=-Xmx3g -Xms1g -XX:+UseParallelGC -XX:ParallelGCThreads=4 -XX:+HeapDumpOnOutOfMemoryError

# Build cache — avoid redundant compilation across builds
org.gradle.caching=true

# Configuration cache — skip re-evaluating build scripts
org.gradle.configuration-cache=true

# Kotlin daemon JVM args — parallel compilation
kotlin.daemon.jvmargs=-Xmx2g -XX:+UseParallelGC

# Kotlin incremental compilation
kotlin.incremental=true

# React Native new architecture
newArchEnabled=true

# Don't generate BuildConfig for library modules
android.defaults.buildfeatures.buildconfig=false

# Use non-transitive R classes — faster resource compilation
android.nonTransitiveRClass=true

# Enable AndroidX
android.useAndroidX=true
