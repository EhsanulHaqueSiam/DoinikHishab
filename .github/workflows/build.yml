name: Build & Release

# 100% free — no EAS Build, no paid services
# Android: expo prebuild + Gradle on GitHub Actions runner
# Web: expo export (static site)
# Convex: deploy functions on push

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - web
      build_type:
        description: 'Android build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

env:
  NODE_VERSION: '20'
  BUN_VERSION: 'latest'
  JAVA_VERSION: '17'

jobs:
  # ── Deploy Convex backend ───────────────────────────────────
  convex-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Deploy Convex functions
        run: bunx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ── TypeScript check ───────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Type check
        run: bunx tsc --noEmit

  # ── Web export (static build) ──────────────────────────────
  web:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Export web build
        run: bunx expo export --platform web
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 30

  # ── Android build (free — Gradle on runner) ────────────────
  android:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android'
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'apk' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Generate native Android project
        run: bunx expo prebuild --platform android --clean --no-install

      - name: Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore
          cat >> android/gradle.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=upload.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=$KEYSTORE_PASSWORD
          MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS
          MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.parallel=true
          org.gradle.workers.max=4
          EOF

      - name: Add signing config to build.gradle
        run: |
          cd android/app
          sed -i '/signingConfigs {/,/}/d' build.gradle 2>/dev/null || true
          sed -i '/buildTypes {/i\
              signingConfigs {\
                  release {\
                      storeFile file("upload.keystore")\
                      storePassword project.findProperty("MYAPP_UPLOAD_STORE_PASSWORD") ?: ""\
                      keyAlias project.findProperty("MYAPP_UPLOAD_KEY_ALIAS") ?: ""\
                      keyPassword project.findProperty("MYAPP_UPLOAD_KEY_PASSWORD") ?: ""\
                  }\
              }' build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        if: env.BUILD_TYPE == 'apk' || env.BUILD_TYPE == 'both'
        run: cd android && ./gradlew app:assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}

      - name: Build release AAB
        if: env.BUILD_TYPE == 'aab' || env.BUILD_TYPE == 'both'
        run: cd android && ./gradlew app:bundleRelease --no-daemon
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}

      - name: Upload APK
        if: env.BUILD_TYPE == 'apk' || env.BUILD_TYPE == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        if: env.BUILD_TYPE == 'aab' || env.BUILD_TYPE == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
